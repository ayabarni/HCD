<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boekenapp</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <h1>Kunst van de dag</h1>
        <p class="intro">
            Ontdek één kunstwerk via geluid. Kies niet wat je wilt zien, maar hoe je het wilt beleven.
        </p>

        <section class="card">
            <p class="dag">Vandaag</p>
            <h2>De sterrennacht</h2>

            <p id="tekstOutput"></p>

            <div class="modes">
                <button class="mode-knop active" data-mode="kort">Kort</button>
                <button class="mode-knop" data-mode="verdieping">Verdieping</button>
                <button class="mode-knop" data-mode="sfeer">Sfeer</button>
            </div>

            <div class="controls">
                <button id="playButton">Afspelen</button>
                <button id="stopButton">Stoppen</button>
            </div>

            <div class="snelheid">
                <label for="snelheidSelect">Leessnelheid</label>
                <select id="snelheidSelect">
                    <option value="0.9">0.9x</option>
                    <option value="1" selected>1x</option>
                    <option value="1.2">1.2x</option>
                    <option value="1.5">1.5x</option>
                </select>
            </div>
        </section>
    </main>



    <script src="js.js"></script>
</body>

</html>
